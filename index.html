<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laetitia Lagarde — Ostéopathe à Nouméa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f4ef;
      color: #2c2b28;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      gap: 2.5rem;
    }

    header { text-align: center; }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #8a9e8c;
      margin-bottom: 0.8rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 2.2rem;
      color: #2c2b28;
    }

    h1 em { font-style: italic; color: #5c7360; }

    .cal-container {
      width: 100%;
      max-width: 820px;
      min-height: 500px;
      background: #fff;
      border: 1px solid #e8e0d4;
    }

    /* Placeholder — à supprimer quand Cal.com est intégré */
    .cal-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 500px;
      color: #9e9488;
      font-size: 0.85rem;
      text-align: center;
      padding: 2rem;
    }
    .cal-placeholder span { font-size: 2rem; opacity: 0.3; }

    footer {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      color: #b0a89e;
    }
  </style>
</head>
<body>

  <header>
    <p class="eyebrow">Ostéopathe — Nouméa</p>
    <h1>Laetitia <em>Lagarde</em></h1>
  </header>

  <div class="cal-container">
    <!-- ↓ REMPLACER CE BLOC PAR L'EMBED CAL.COM ↓ -->
    <div class="cal-placeholder">
      <span>📅</span>
      <p>Widget Cal.com à intégrer ici</p>
    </div>
    <!-- ↑ FIN DU BLOC À REMPLACER ↑ -->
  </div>

  <footer>86 39 53 · Nouméa, Nouvelle-Calédonie</footer>

</body>
</html>
